version: "3.9"

services:

  # ── PostgreSQL Database ──────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: crm_feedback_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     crmuser
      POSTGRES_PASSWORD: crmpassword
      POSTGRES_DB:       crmdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crmuser -d crmdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - crm_net

  # ── Go Backend API ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crm_feedback_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: "host=db port=5432 user=crmuser password=crmpassword dbname=crmdb sslmode=disable"
      GIN_MODE:     release
      PORT:         "8080"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - crm_net

  # ── Vue 3 Frontend (Nginx) ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crm_feedback_frontend
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - crm_net

# ── Volumes ──────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local

# ── Networks ─────────────────────────────────────────────────
networks:
  crm_net:
    driver: bridge
