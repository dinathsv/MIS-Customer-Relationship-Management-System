<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM Feedback Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
    <script>
      (function() {
        const switcherHtml = `
          <div id="global-module-switcher" style="position: fixed; bottom: 20px; right: 20px; z-index: 999999; font-family: 'Inter', sans-serif;">
            <button id="switcher-btn" style="background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; border: none; padding: 12px 24px; border-radius: 50px; cursor: pointer; font-weight: 600; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4); display: flex; align-items: center; gap: 8px; transition: transform 0.2s;">
              <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
              Switch Module
            </button>
            <div id="switcher-menu" style="display: none; position: absolute; bottom: 100%; right: 0; margin-bottom: 10px; background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; overflow: hidden; width: 220px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
              <a href="http://localhost:3000" style="display: block; padding: 12px 16px; color: #f8fafc; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.2s;">🏠 Enterprise Portal</a>
              <a href="http://localhost:8086" style="display: block; padding: 12px 16px; color: #cbd5e1; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.2s;">💼 Sales Module</a>
              <a href="http://localhost:3001" style="display: block; padding: 12px 16px; color: #cbd5e1; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.2s;">⚠️ Complain Mgmt</a>
              <a href="http://localhost:8083" style="display: block; padding: 12px 16px; color: #cbd5e1; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.2s;">👥 User Mgmt</a>
              <a href="http://localhost:8085" style="display: block; padding: 12px 16px; color: #cbd5e1; text-decoration: none; transition: background 0.2s;">⭐ Feedback</a>
            </div>
          </div>
        `;
        document.body.insertAdjacentHTML('beforeend', switcherHtml);
        const btn = document.getElementById('switcher-btn');
        const menu = document.getElementById('switcher-menu');
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
        });
        document.addEventListener('click', () => {
          menu.style.display = 'none';
        });
        const links = menu.querySelectorAll('a');
        links.forEach(l => l.addEventListener('mouseenter', () => l.style.background = 'rgba(255,255,255,0.1)'));
        links.forEach(l => l.addEventListener('mouseleave', () => l.style.background = 'transparent'));
      })();
    </script>
</body>
</html>
