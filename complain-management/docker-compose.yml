version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: crm_complain_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - crm-network

  backend:
    build: ./backend
    container_name: crm_complain_backend
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - db
    networks:
      - crm-network

  frontend:
    build: ./frontend
    container_name: crm_complain_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - crm-network

volumes:
  pgdata:

networks:
  crm-network:
    driver: bridge