<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="SalesHub - Admin Dashboard for Sales Module. Manage sales transactions, invoices, customers, and analytics." />
  <title>SalesHub — Sales Module Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232563eb' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polygon points='12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2'></polygon></svg>" />
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
    <script>
      (function() {
        const switcherHtml = `
          <div id="global-module-switcher" style="position: fixed; bottom: 20px; right: 20px; z-index: 999999; font-family: 'Inter', sans-serif;">
            <button id="switcher-btn" style="background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; border: none; padding: 12px 24px; border-radius: 50px; cursor: pointer; font-weight: 600; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4); display: flex; align-items: center; gap: 8px; transition: transform 0.2s;">
              <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
              Switch Module
            </button>
            <div id="switcher-menu" style="display: none; position: absolute; bottom: 100%; right: 0; margin-bottom: 10px; background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; overflow: hidden; width: 220px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
              <a href="/" style="display: block; padding: 12px 16px; color: #f8fafc; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.2s;">🏠 Enterprise Portal</a>
              <a href="/sales/" style="display: block; padding: 12px 16px; color: #cbd5e1; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.2s;">💼 Sales Module</a>
              <a href="/complain/" style="display: block; padding: 12px 16px; color: #cbd5e1; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.2s;">⚠️ Complain Mgmt</a>
              <a href="/usermgmt/" style="display: block; padding: 12px 16px; color: #cbd5e1; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.2s;">👥 User Mgmt</a>
              <a href="/feedback/" style="display: block; padding: 12px 16px; color: #cbd5e1; text-decoration: none; transition: background 0.2s;">⭐ Feedback</a>
            </div>
          </div>
        `;
        document.body.insertAdjacentHTML('beforeend', switcherHtml);
        const btn = document.getElementById('switcher-btn');
        const menu = document.getElementById('switcher-menu');
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
        });
        document.addEventListener('click', () => {
          menu.style.display = 'none';
        });
        const links = menu.querySelectorAll('a');
        links.forEach(l => l.addEventListener('mouseenter', () => l.style.background = 'rgba(255,255,255,0.1)'));
        links.forEach(l => l.addEventListener('mouseleave', () => l.style.background = 'transparent'));
      })();
    </script>
</body>
</html>
